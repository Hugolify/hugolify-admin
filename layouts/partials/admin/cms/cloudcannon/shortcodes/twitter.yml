  hugolify_twitter:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      text: {{ i18n "admin.shortcodes.twitter.label" | default "Twitter / X" }}
    definitions:
      shortcode_name: tweet
      named_args:
        - source_key: user
          editor_key: user
          type: string
        - source_key: id
          editor_key: id
          type: string
    _inputs:
      user:
        type: text
      id:
        type: text
