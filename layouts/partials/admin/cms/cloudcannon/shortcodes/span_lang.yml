  hugolify_span_lang:
    template: hugo_shortcode_named_args
    inline: true
    preview:
      text: {{ i18n "admin.shortcodes.span_lang.label" | default "Span lang" }}
    definitions:
      shortcode_name: span_lang
      named_args:
        - source_key: text
          editor_key: text
          type: string
        - source_key: lang
          editor_key: lang
          type: string
    _inputs:
      text:
        type: text
      lang:
        type: text
