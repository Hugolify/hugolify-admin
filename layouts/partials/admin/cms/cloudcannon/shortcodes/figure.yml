  hugolify_figure:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      text: {{ i18n "admin.shortcodes.figure.label" | default "Figure" }}
    definitions:
      shortcode_name: figure
      named_args:
        - source_key: src
          editor_key: src
          type: string
        - source_key: alt
          editor_key: alt
          type: string
          optional: true
        - source_key: legend
          editor_key: legend
          type: string
          optional: true
        - source_key: credit
          editor_key: credit
          type: string
          optional: true
        - source_key: screenshot
          editor_key: screenshot
          type: boolean
          optional: true
    _inputs:
      src:
        type: image
      alt:
        type: text
      legend:
        type: text
      credit:
        type: text
      screenshot:
        type: checkbox
