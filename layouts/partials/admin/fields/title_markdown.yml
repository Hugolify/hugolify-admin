{{- $name := dict "name" "title" }}
{{- if eq site.Params.admin.cms "tinacms" }}
  {{- $name = dict "name" "title_markdown" "nameOverride" "title" }}
{{- end }}

{{- $args := dict 
  "label" (i18n "admin.fields.title.label")
  "minimal" (site.Params.admin.fields.title_markdown.minimal | default true)
  "buttons" (site.Params.admin.fields.title_markdown.buttons | default "['bold', 'italic']")
  "modes" (site.Params.admin.fields.title_markdown.modes | default "['rich_text']")
  -}}

{{- $args = merge $args $name }}

{{ partial "admin/widgets/markdown.js" $args }}
