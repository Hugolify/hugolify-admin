{{- $name := dict "name" "text" }}
{{- if eq site.Params.admin.cms "tinacms" }}
  {{- $name = dict "name" "text_markdown" "nameOverride" "text" }}
{{- end }}

{{- $args := dict 
  "label" (i18n "admin.fields.text.label")
  "minimal" (site.Params.admin.fields.text_markdown.minimal | default true)
  "buttons" (site.Params.admin.fields.text_markdown.buttons | default "['bold', 'italic', 'link', 'bulleted-list']")
  "modes" (site.Params.admin.fields.text_markdown.modes | default "['rich_text']")
  -}}

{{- $args = merge $args $name }}

{{ partial "admin/widgets/markdown.js" $args }}
